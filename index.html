<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Elle & Cy | Our Forever Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: linear-gradient(145deg, #fff0e7 0%, #ffe0d4 100%); font-family: 'Inter', sans-serif; padding: 20px; min-height: 100vh; }
    .journal-app { max-width: 1300px; margin: 0 auto; background: rgba(255, 250, 245, 0.96); border-radius: 56px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.12); padding: 24px 28px 40px; }
    .header { text-align: center; margin-bottom: 32px; border-bottom: 2px dashed #f3c6b0; padding-bottom: 20px; }
    .header h1 { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #b13e5c; }
    .sync-status { display: inline-block; background: #e8f5e9; border-radius: 60px; padding: 4px 14px; font-size: 0.7rem; margin-top: 10px; color: #2e7d32; }
    .sync-status.error { background: #ffebee; color: #c62828; }
    .journal-grid { display: flex; flex-wrap: wrap; gap: 32px; }
    .entry-form { flex: 1.2; min-width: 280px; background: #fffef7; border-radius: 40px; padding: 28px; border: 1px solid #ffded0; }
    .entries-list { flex: 1.8; min-width: 300px; background: #fffaf5; border-radius: 40px; padding: 28px; border: 1px solid #ffded0; max-height: 60vh; overflow-y: auto; }
    .form-title, .list-title { font-size: 1.5rem; font-weight: 600; color: #a1425a; margin-bottom: 22px; display: flex; align-items: center; gap: 12px; border-left: 5px solid #e68a7c; padding-left: 18px; }
    input, textarea { width: 100%; border: 1.5px solid #ffe0d4; border-radius: 32px; padding: 14px 22px; font-family: 'Inter', sans-serif; margin-bottom: 20px; }
    textarea { min-height: 150px; resize: vertical; }
    .btn { background: #e6838e; color: white; border: none; border-radius: 60px; padding: 12px 24px; font-weight: 600; cursor: pointer; width: 100%; font-family: 'Inter', sans-serif; }
    .journal-card { background: white; border-radius: 32px; padding: 20px; margin-bottom: 22px; border: 1px solid #ffe2d4; }
    .entry-title { font-size: 1.35rem; font-weight: 700; color: #b13e5c; }
    .entry-meta { font-size: 0.7rem; color: #c28d7a; margin: 8px 0 12px; }
    .entry-content { color: #4f3e38; line-height: 1.55; white-space: pre-wrap; background: #fffaf2; padding: 14px 18px; border-radius: 28px; }
    .delete-btn { background: transparent; border: none; color: #bc7a6b; cursor: pointer; float: right; }
    .love-footer { text-align: center; margin-top: 35px; font-family: 'Great Vibes', cursive; color: #b35d6e; }
    .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #3e2a24e0; color: white; padding: 10px 24px; border-radius: 60px; z-index: 1100; transition: 0.2s; }
  </style>
</head>
<body>
<div class="journal-app">
  <div class="header">
    <h1><i class="fas fa-heart"></i> Elle & Cy's Forever Journal</h1>
    <p>real-time • auto-save • laging magkasama ang ating mga alaala</p>
    <div class="sync-status" id="syncStatus"><i class="fas fa-spinner fa-pulse"></i> Connecting...</div>
  </div>

  <div class="journal-grid">
    <div class="entry-form">
      <div class="form-title"><i class="fas fa-pen-fancy"></i> <span>Write a new memory</span></div>
      <input type="text" id="entryTitle" placeholder="💌 Title">
      <textarea id="entryContent" placeholder="Write your heart out..."></textarea>
      <button class="btn" id="saveEntryBtn"><i class="fas fa-save"></i> Save to Cloud</button>
    </div>

    <div class="entries-list">
      <div class="list-title"><i class="fas fa-book-open"></i><span>Our memories</span><span style="margin-left: auto; font-size: 0.7rem;" id="entryCount"></span></div>
      <div id="entriesContainer"><div class="empty-message"><i class="fas fa-spinner fa-pulse"></i> Loading memories...</div></div>
    </div>
  </div>
  
  <div class="love-footer">🌹 "Every love story is beautiful, but ours is my favorite." 🌹</div>
</div>
<div id="toastMsg" class="toast-msg" style="opacity:0;">✨</div>

<script>
  // SHEET.BEST API - REAL TIME!
  const API_URL = "https://api.sheetbest.com/sheets/56bac637-b823-4646-9864-5868ac2b2cd3";
  
  let journalEntries = [];
  let autoRefresh = null;
  
  const statusEl = document.getElementById('syncStatus');
  
  function showToast(msg, duration = 2500) {
    const toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, duration);
  }
  
  function updateStatus(text, isError = false) {
    statusEl.innerHTML = text;
    statusEl.classList.toggle('error', isError);
  }
  
  async function loadEntries() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error('Failed to load');
      
      const data = await res.json();
      // Ang Sheet.best na may column headers ay direktang nagre-return ng array ng objects
      if (Array.isArray(data)) {
        journalEntries = data;
        renderEntries();
        updateStatus('<i class="fas fa-check-circle"></i> Connected • Real-time ON');
      } else {
        throw new Error('Invalid data format');
      }
    } catch (err) {
      console.error(err);
      updateStatus('<i class="fas fa-exclamation-triangle"></i> Connection issue', true);
      // Fallback sa local backup
      const backup = localStorage.getItem('journalBackup');
      if (backup) {
        journalEntries = JSON.parse(backup);
        renderEntries();
      }
    }
  }
  
  async function saveEntry(title, content) {
    if (!title.trim() && !content.trim()) {
      showToast("💌 Please write something!");
      return false;
    }
    
    const newEntry = {
      id: Date.now().toString(),
      title: title.trim() || "💭 A sweet memory",
      content: content.trim() || "✨",
      date: new Date().toISOString(),
      formattedDate: new Date().toLocaleString()
    };
    
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(newEntry)
      });
      
      if (!res.ok) throw new Error('Save failed');
      
      await loadEntries();
      showToast('✨ Saved! Makikita na ng mahal mo! ✨');
      return true;
    } catch (err) {
      console.error(err);
      showToast('⚠️ Error saving, try again');
      return false;
    }
  }
  
  async function deleteEntry(id) {
    try {
      // Hanapin ang row na may matching id
      const res = await fetch(API_URL);
      const entries = await res.json();
      
      let rowIndex = -1;
      for (let i = 0; i < entries.length; i++) {
        if (entries[i].id == id) {
          rowIndex = i;
          break;
        }
      }
      
      if (rowIndex !== -1) {
        const deleteRes = await fetch(`${API_URL}/${rowIndex}`, { method: 'DELETE' });
        if (deleteRes.ok) {
          await loadEntries();
          showToast('🗑️ Deleted');
        }
      }
    } catch (err) {
      console.error(err);
      showToast('Error deleting');
    }
  }
  
  function renderEntries() {
    const container = document.getElementById('entriesContainer');
    const countSpan = document.getElementById('entryCount');
    
    if (!journalEntries.length) {
      container.innerHTML = '<div class="empty-message">No memories yet. Write your first memory! 💕</div>';
      countSpan.innerText = '0 memories';
      return;
    }
    
    const sorted = [...journalEntries].sort((a,b) => new Date(b.date) - new Date(a.date));
    let html = '';
    for (let e of sorted) {
      html += `
        <div class="journal-card">
          <div class="entry-title">${escapeHtml(e.title)}</div>
          <div class="entry-meta"><i class="far fa-calendar-alt"></i> ${e.formattedDate}</div>
          <div class="entry-content">${escapeHtml(e.content).replace(/\n/g, '<br>')}</div>
          <button class="delete-btn" data-id="${e.id}"><i class="fas fa-trash-alt"></i> Delete</button>
        </div>
      `;
    }
    container.innerHTML = html;
    countSpan.innerText = `${journalEntries.length} memories`;
    
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteEntry(btn.dataset.id));
    });
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }
  
  async function handleSave() {
    const title = document.getElementById('entryTitle').value;
    const content = document.getElementById('entryContent').value;
    const success = await saveEntry(title, content);
    if (success) {
      document.getElementById('entryTitle').value = '';
      document.getElementById('entryContent').value = '';
    }
  }
  
  document.getElementById('saveEntryBtn').addEventListener('click', handleSave);
  document.getElementById('entryContent').addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') handleSave();
  });
  
  // Backup sa localStorage
  setInterval(() => {
    if (journalEntries.length) localStorage.setItem('journalBackup', JSON.stringify(journalEntries));
  }, 10000);
  
  loadEntries();
  autoRefresh = setInterval(loadEntries, 5000);
</script>
</body>
</html>
